version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /tests
    schedule:
      interval: weekly
    groups:
      npm-tests:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
