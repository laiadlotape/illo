name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION="$(node -e "process.stdout.write(require('./.claude-plugin/plugin.json').version)")"
          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: plugin.json version ($PLUGIN_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PLUGIN_VERSION"

      - name: Extract CHANGELOG section for this release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY="$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)"
          printf 'body<<EOF\n%s\nEOF\n' "$BODY" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
