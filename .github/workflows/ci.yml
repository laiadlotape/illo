name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-and-dogfood:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: node --version
      - run: cd tests && npm ci
      - name: npm audit (dev dependencies)
        run: cd tests && npm audit --audit-level=moderate
        continue-on-error: true
      - run: npm run test:unit
        working-directory: tests
      - run: npm run test:dogfood
        working-directory: tests
      - run: npm run test:tui
        working-directory: tests
      - run: npm run test:integration
        working-directory: tests
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - run: npm run test:sdk-python
        working-directory: tests

  ux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20.x'
      - run: cd tests && npm ci
      - run: npx playwright install --with-deps chromium
        working-directory: tests
      - run: npm run test:ux
        working-directory: tests
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: tests/playwright-report

  plugin-validate:
    # TODO: install the claude CLI here and run `claude plugin validate .`
    # No installation recipe is available yet.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
